{% extends "base.html" %}

{% block content %}
<h1>Register</h1>

<form method="post" action="/register">

    <div>
        <label>Username:</label>
        <input name="username" required>
    </div>

    <div>
        <label>Email:</label>
        <input name="email" type="email" required>
    </div>

    <div>
        <label>Password:</label>
        <input name="password" type="password" required>
    </div>

    <button type="submit">
        Register
    </button>

</form>
{% endblock %}
