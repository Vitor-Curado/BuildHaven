services:
  app:
    image: ghcr.io/vitor-curado/buildhaven:latest
    ports:
      - "3000:3000"
    restart: always
    env_file:
      - .env.compose
    networks:
      - backend

  db:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: VioletteSzabo2147$
      POSTGRES_DB: buildhaven
    volumes:
      #- postgres_data:/var/lib/postgresql/18/data
      - postgres_data:/var/lib/postgresql/data:Z
    ports: []
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - backend

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    restart: always

  victoriametrics:
    image: victoriametrics/victoria-metrics
    container_name: vm
    ports:
      - "8428:8428"
    volumes:
      - vm_data:/storage
    command:
      - "-storageDataPath=/storage"
      - "-httpListenAddr=:8428"
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    restart: always
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: victoriametrics-metrics-datasource
        access: proxy
        url: http://victoriametrics:8428
        isDefault: true
        
      - name: VictoriaMetrics - cluster
        type: victoriametrics-metrics-datasource
        access: proxy
        url: http://vmselect:8481/select/0/prometheus
        isDefault: false
    
volumes:
  postgres_data:
  grafana_data:
  vm_data:

networks:
  backend: