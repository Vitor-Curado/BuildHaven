services:
  app:
    image: ghcr.io/vitor-curado/buildhaven:latest
    ports:
      - "3000:3000"
    restart: always
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:latest #we can afford that, for now. It's okay to leave as latest
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: VioletteSzabo2147$
      POSTGRES_DB: buildhaven
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    
volumes:
  postgres_data: